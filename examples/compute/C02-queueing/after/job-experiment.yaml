# Three experiment jobs submitted to the Kueue LocalQueue.
#
# Each requests 1 CPU. The ClusterQueue allows only 2 CPUs total.
# Two jobs get admitted immediately; the third waits in the queue.
# When you run `kubectl get workloads`, you'll see its position and status.
#
# The key differences from before/jobs.yaml:
#   labels:
#     kueue.x-k8s.io/queue-name: ml-team           <-- routes the job through Kueue
#     kueue.x-k8s.io/priority-class: experiment    <-- declares priority (must be a label)
#
# On a real GPU cluster: change "cpu: 1" to "nvidia.com/gpu: 1" and
# set imagePullPolicy to Always (or IfNotPresent) with a real registry image.
apiVersion: batch/v1
kind: Job
metadata:
  name: experiment-a
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: ml-team
    kueue.x-k8s.io/priority-class: experiment
spec:
  suspend: true  # Kueue controls admission; jobs start suspended
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: training-job:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "1"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "128Mi"
          volumeMounts:
            - name: checkpoints
              mountPath: /checkpoints
      volumes:
        - name: checkpoints
          emptyDir: {}
---
