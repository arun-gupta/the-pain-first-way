# v2-bad — simulates a broken model update.
# The container starts (so the pod shows Running) but never serves HTTP.
# Without a readiness probe, the Deployment considers this a successful rollout.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-server
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: model-server
  template:
    metadata:
      labels:
        app: model-server
    spec:
      containers:
      - name: server
        image: nginx:alpine
        command: ["sh", "-c", "sleep 3600"]
        ports:
        - containerPort: 80
