# v2-bad — simulates a broken model update.
# The container starts (pod shows Running) but never serves HTTP.
# Without a readiness probe, the rolling update completes and Kubernetes
# reports success — even though every pod is now serving nothing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-server
  template:
    metadata:
      labels:
        app: model-server
    spec:
      containers:
      - name: server
        image: nginx:alpine
        command: ["sh", "-c", "sleep 3600"]
        ports:
        - containerPort: 80
