# Two bare Jobs that simulate a distributed training run without gang scheduling.
#
# The master (rank 0) opens a rendezvous server and waits 60 s for the worker.
# The worker (rank 1) sleeps 90 s before connecting — simulating a node that is
# still pulling the image or under memory pressure when the job is submitted.
#
# Result: the master times out, both pods fail, and no training happens.
# This is the "NCCL hang" experience in miniature.
#
# Prerequisites: build dist-training:latest first (see ../after/build.sh).

---
# ClusterIP Service so the worker can reach the master pod by a stable DNS name.
# This is the best you can do with bare Jobs: it cannot guarantee the master pod
# is ready before the worker tries to connect.
apiVersion: v1
kind: Service
metadata:
  name: dist-master
spec:
  selector:
    app: dist-master
  ports:
    - port: 29500
      targetPort: 29500
  type: ClusterIP

---
# Rank 0: master. Opens the rendezvous server. Waits 60 s for the worker.
apiVersion: batch/v1
kind: Job
metadata:
  name: dist-master
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: dist-master
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: dist-training:latest
          imagePullPolicy: Never
          env:
            - name: RANK
              value: "0"
            - name: WORLD_SIZE
              value: "2"
            - name: MASTER_ADDR
              value: "dist-master"
            - name: MASTER_PORT
              value: "29500"
            - name: RENDEZVOUS_TIMEOUT
              value: "60"

---
# Rank 1: worker. WORKER_STARTUP_DELAY simulates a node that is still pulling
# the image when the master is already waiting. 90 s > 60 s timeout → master dies.
apiVersion: batch/v1
kind: Job
metadata:
  name: dist-worker
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: dist-training:latest
          imagePullPolicy: Never
          env:
            - name: RANK
              value: "1"
            - name: WORLD_SIZE
              value: "2"
            - name: MASTER_ADDR
              value: "dist-master"
            - name: MASTER_PORT
              value: "29500"
            - name: RENDEZVOUS_TIMEOUT
              value: "60"
            - name: WORKER_STARTUP_DELAY
              value: "90"
