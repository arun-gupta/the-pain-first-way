apiVersion: v1
kind: Pod
metadata:
  name: inference-server
spec:
  # The init container runs first and must exit 0 before the server starts.
  # It downloads weights to the shared volume at /model.
  # Swap this container to change the weight source. The server container never changes.
  initContainers:
    - name: weight-downloader
      image: inference-server:latest
      imagePullPolicy: Never
      command: ["python", "downloader.py"]
      volumeMounts:
        - name: model
          mountPath: /model

  containers:
    - name: inference-server
      image: inference-server:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: model
          mountPath: /model

  # emptyDir: shared scratch space, lives for the lifetime of the pod.
  # The init container writes to it; the server reads from it.
  volumes:
    - name: model
      emptyDir: {}

  restartPolicy: Never
