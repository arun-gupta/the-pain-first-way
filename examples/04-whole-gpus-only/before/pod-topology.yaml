# Two-GPU workload — raw integer request, no topology constraints.
#
# On a real cluster this would be nvidia.com/gpu: 2.
# The scheduler places this pod on any node with 2 CPUs (GPU stand-in) free.
# It cannot tell whether the two GPUs share an NVLink domain.
# If they don't, AllReduce falls back to system RAM — ~40% throughput penalty.
apiVersion: v1
kind: Pod
metadata:
  name: two-gpu-no-topology
spec:
  containers:
  - name: training
    image: busybox
    command:
    - sh
    - -c
    - |
      echo "scheduled on node: $(cat /proc/sys/kernel/hostname)"
      echo "no topology guarantee — could be any two GPUs"
      sleep 3600
    resources:
      requests:
        cpu: "2"
      limits:
        cpu: "2"
  restartPolicy: Never
