# Workaround: use nodeAffinity to require a specific NVLink domain.
#
# This works as long as every GPU node has been manually labeled.
# It breaks the moment a new node is added without the label:
#   - the pod stays Pending with no error about the missing label
#   - the cluster admin has to know to add the label
#   - adding the wrong label silently produces wrong placement
#
# The affinity rules grow with each new topology dimension you need to track.
apiVersion: v1
kind: Pod
metadata:
  name: two-gpu-with-affinity
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.gpu/nvlink-domain
            operator: In
            values: ["0"]
  containers:
  - name: training
    image: busybox
    command:
    - sh
    - -c
    - |
      echo "scheduled on node: $(cat /proc/sys/kernel/hostname)"
      echo "required nvlink-domain=0 via nodeAffinity"
      sleep 3600
    resources:
      requests:
        cpu: "2"
      limits:
        cpu: "2"
  restartPolicy: Never
