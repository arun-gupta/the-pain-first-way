apiVersion: v1
kind: Secret
metadata:
  name: model-credentials
type: Opaque
# stringData accepts plain text -- Kubernetes base64-encodes the values at apply time.
# In production, populate this from AWS Secrets Manager, GCP Secret Manager,
# or HashiCorp Vault via External Secrets Operator rather than storing values here.
stringData:
  AWS_ACCESS_KEY_ID: "AKIAIOSFODNN7EXAMPLE"
  AWS_SECRET_ACCESS_KEY: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
