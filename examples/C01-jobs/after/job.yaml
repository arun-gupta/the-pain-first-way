apiVersion: batch/v1
kind: Job
metadata:
  name: training-job
spec:
  # Retry up to 4 times on failure. Each restart picks up from the last checkpoint.
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: trainer
          image: training-job:latest
          # Never pull from a registry -- the image was loaded directly into Kind.
          imagePullPolicy: Never
          volumeMounts:
            - name: checkpoints
              mountPath: /checkpoints
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: training-checkpoints
